name: Publish Industry Report Releases

on:
  push:
    branches:
      - main
    paths:
      - 'daily/**/*.md'
      - 'weekly/**/*.md'
      - 'monthly/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-industry-report-releases-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create or update report releases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
