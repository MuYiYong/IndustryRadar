name: Publish Industry Report Releases

on:
  push:
    branches:
      - main
    paths:
      - 'daily/**/*.md'
      - 'weekly/**/*.md'
      - 'monthly/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-industry-report-releases-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create or update report releases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      EVENT_NAME: ${{ github.event_name }}
      BEFORE_SHA: ${{ github.event.before }}
      AFTER_SHA: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish report releases
        shell: bash
        run: |
          chmod +x .github/scripts/publish-report-releases.sh
          .github/scripts/publish-report-releases.sh
